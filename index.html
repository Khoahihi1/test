<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>English Revision Pro</title>
<style>
  :root {
    --primary: #16a34a;
    --primary-dark: #15803d;
    --bg: #f0fdf4;
    --card: #ffffff;
    --text: #1f2937;
    --muted: #6b7280;
    --border: #e5e7eb;
    --ok-bg: #dcfce7; --ok-border: #22c55e; --ok-text: #166534;
    --bad-bg: #fee2e2; --bad-border: #ef4444; --bad-text: #991b1b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.55; padding-bottom: 90px;
  }
  .header {
    position: sticky; top: 0; z-index: 50; background: #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,.08); padding: 10px 14px;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .header h1 { margin: 0; font-size: 1.05rem; color: var(--primary); font-weight: 700; }
  .timer {
    font-weight: 700; color: var(--bad-text); background: var(--bad-bg);
    padding: 4px 10px; border-radius: 8px; font-size: .9rem; display: none;
  }
  .tabbar { display: flex; gap: 6px; margin-top: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tabbar::-webkit-scrollbar { display: none; }
  .tab-group { display: flex; background: #f3f4f6; border-radius: 8px; padding: 3px; flex-shrink: 0; }
  .tab-btn {
    border: none; background: transparent; padding: 7px 12px; border-radius: 6px;
    font-weight: 600; font-size: .82rem; color: var(--muted); white-space: nowrap;
  }
  .tab-btn.active { background: #fff; color: var(--primary); box-shadow: 0 1px 3px rgba(0,0,0,.12); }

  .container { max-width: 720px; margin: 0 auto; padding: 12px 10px 40px; }

  .part-title {
    font-size: 1.05rem; color: #fff; background: var(--primary);
    padding: 10px 14px; border-radius: 10px; margin: 22px 0 10px;
    font-weight: 700;
  }
  .part-title:first-child { margin-top: 4px; }

  .passage {
    background: #fff; padding: 14px; border-radius: 10px; border-left: 4px solid var(--primary);
    box-shadow: 0 1px 3px rgba(0,0,0,.05); margin-bottom: 12px; font-size: .95rem; color: #4b5563;
  }
  .p3-intro {
    background: #fff; padding: 12px 14px; border-radius: 10px; border-left: 4px solid var(--primary);
    margin-bottom: 12px; font-size: .92rem; font-style: italic; color: #4b5563;
  }

  .q-card {
    background: #fff; padding: 14px; border-radius: 12px; margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06); border: 1px solid var(--border);
  }
  .q-text { font-weight: 700; font-size: .98rem; margin-bottom: 10px; }
  .q-num { color: var(--primary); }

  .opt {
    display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px;
    border: 2px solid var(--border); border-radius: 9px; margin-bottom: 7px;
    cursor: pointer; font-size: .92rem; background: #fff; transition: .15s;
  }
  .opt:active { background: #f9fafb; }
  .opt .letter {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; background: #f3f4f6;
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .78rem;
  }
  .opt.disabled { pointer-events: none; }
  .opt.correct-mark { background: var(--ok-bg); border-color: var(--ok-border); color: var(--ok-text); }
  .opt.wrong-mark { background: var(--bad-bg); border-color: var(--bad-border); color: var(--bad-text); }
  .opt.revealed { background: var(--ok-bg); border-color: var(--ok-border); color: var(--ok-text); font-weight: 600; }

  .revealed-mode .opt { pointer-events: none; }

  select.dropdown-ans {
    width: 100%; padding: 11px; border-radius: 9px; border: 2px solid var(--border);
    font-size: .9rem; background: #fff; color: var(--text); margin-top: 4px;
  }
  input.text-input {
    width: 100%; padding: 11px; border-radius: 9px; border: 2px solid var(--border);
    font-size: .95rem; margin-top: 4px;
  }

  .ans-box {
    margin-top: 10px; padding: 10px 12px; background: var(--ok-bg); color: var(--ok-text);
    border: 1px dashed var(--ok-border); border-radius: 8px; font-weight: 700; font-size: .88rem;
    display: none;
  }
  .ans-box.show { display: block; }

  .btn-mini {
    background: #6b7280; color: #fff; border: none; padding: 7px 12px; border-radius: 7px;
    font-size: .82rem; font-weight: 600; margin-top: 8px;
  }

  .match-options-box {
    background: #f9fafb; border: 1px solid var(--border); border-radius: 9px; padding: 10px 12px;
    margin-bottom: 14px; font-size: .85rem; color: var(--muted);
  }
  .match-options-box .opt-line { margin: 3px 0; }
  .match-options-box .opt-line b { color: var(--text); }

  .floating-controls {
    position: fixed; bottom: 14px; left: 0; right: 0; display: flex; justify-content: center;
    gap: 10px; z-index: 60; padding: 0 12px;
  }
  .floating-btn {
    background: #fff; border: 1px solid var(--border); padding: 10px 16px; border-radius: 24px;
    font-weight: 700; font-size: .82rem; box-shadow: 0 3px 10px rgba(0,0,0,.15); color: var(--text);
  }
  .floating-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .floating-btn.reset { color: var(--bad-text); }

  .btn-submit {
    display: none; position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    background: var(--primary); color: #fff; border: none; padding: 13px 32px; border-radius: 26px;
    font-weight: 700; font-size: .95rem; box-shadow: 0 4px 14px rgba(0,0,0,.2); z-index: 60;
  }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 90; }
  .modal {
    display: none; position: fixed; z-index: 91; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: #fff; padding: 26px 22px; border-radius: 16px; text-align: center; width: 86%; max-width: 320px;
  }
  .modal h2 { margin: 0 0 8px; color: var(--primary); }
  .modal .score { font-size: 2rem; font-weight: 800; margin: 10px 0; }
  .modal button {
    background: var(--primary); color: #fff; border: none; padding: 10px 26px; border-radius: 20px;
    font-weight: 700; margin-top: 8px;
  }

  @media (min-width: 640px) {
    .header { padding: 14px 24px; }
    .header h1 { font-size: 1.3rem; }
    .container { padding: 20px 16px 50px; }
    .q-text { font-size: 1.05rem; }
    .opt { font-size: .98rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>📘 English Revision Pro</h1>
    <span class="timer" id="timer">45:00</span>
  </div>
  <div class="tabbar">
    <div class="tab-group" id="skill-group">
      <button class="tab-btn active" id="btn-reading" onclick="setSkill('reading')">Reading</button>
      <button class="tab-btn" id="btn-listening" onclick="setSkill('listening')">Listening</button>
    </div>
    <div class="tab-group" id="test-group"></div>
    <div class="tab-group">
      <button class="tab-btn active" id="btn-practice" onclick="setMode('practice')">Luyện tập</button>
      <button class="tab-btn" id="btn-test" onclick="setMode('test')">Thi thử</button>
    </div>
  </div>
</div>

<div class="container" id="quiz-container"></div>

<div class="floating-controls" id="floating-controls">
  <button class="floating-btn reset" onclick="resetAllAnswers()">🔄 Làm lại</button>
  <button class="floating-btn" id="btn-toggle-answers" onclick="toggleAllAnswers()">👁️ Xem đáp án</button>
</div>

<button class="btn-submit" id="btn-submit" onclick="submitTest()">✅ Nộp bài</button>

<div class="overlay" id="overlay"></div>
<div class="modal" id="modal">
  <h2>Kết quả</h2>
  <div class="score" id="score-text">0 / 0</div>
  <div id="score-detail" style="color:var(--muted); font-size:.85rem;"></div>
  <button onclick="closeModal()">Đóng</button>
</div>

          { q: "Alexis's latest expedition involved...", opts: ["walking across a desert.","sailing across an ocean.","spending time in a rainforest."], correct: 1 },
          { q: "What does Alexis say he wants to do in the future?", opts: ["try a different profession","explore his home country","return to places he's visited before"], correct: 1 }
        ]
      }
    },
    4: {
      part1: [
        { q: "What has the man lost?", opts: ["His gloves","His glasses","His headphones"], correct: 1 },
        { q: "What is the woman going to do tomorrow?", opts: ["Drive to the coast","Go to the beach","Have a meal at her cousin's house"], correct: 1 },
        { q: "Which items cost less than usual at the moment?", opts: ["Phones","Sports equipment","Coats and handbags"], correct: 1 },
        { q: "Which place will the people visit first on the tour?", opts: ["A café by the river","A castle","A museum"], correct: 1 },
        { q: "Which tickets did the man buy?", opts: ["€20 tickets","€30 tickets","€50 tickets"], correct: 1 },
        { q: "What does the man want to buy?", opts: ["An electric guitar","Drums","A piano"], correct: 1 },
        { q: "Which type of exercise does the doctor recommend?", opts: ["Lifting weights","Running","Swimming"], correct: 2 }
      ],
      part2: [
        { q: "You will hear two friends talking about a hotel. They agree that...", opts: ["the staff are very friendly.","the rooms have good views.","the food there is excellent."], correct: 0 },
        { q: "You will hear two friends talking about an art exhibition. Why was the woman disappointed with it?", opts: ["There weren't many paintings.","It was very expensive.","The gallery was too dark."], correct: 2 },
        { q: "You will hear two friends talking about a book they've read. They both think it would be better if it had...", opts: ["a more original ending.","more interesting characters.","more action in the story."], correct: 2 },
        { q: "You will hear a woman telling a friend about a visit to the hairdresser's. What does she say about it?", opts: ["The haircut wasn't good value.","The place wasn't very tidy.","The hairdresser wasn't very friendly."], correct: 0 },
        { q: "You will hear a woman telling a friend about her singing class. What is she surprised about?", opts: ["the size of the group","how confident she feels about singing","the attention she gets from the teacher"], correct: 1 },
        { q: "You will hear two friends talking about a new sports centre. What do they agree would improve it?", opts: ["reducing the entry price","offering classes at different times","changing the temperature in the pool"], correct: 2 }
      ],
      part3: {
        intro: "You will hear a guide giving information to people who are going to watch a car race involving old cars.",
        items: [
          { q: "Before the race: see the cars, next to the (14) ......", ans: "lake" },
          { q: "Before the race: enter a competition to win a (15) ......", ans: "holiday" },
          { q: "Before the race: buy (16) ...... at a lower price than usual at the café.", ans: "burgers / a burger" },
          { q: "The race starts at (17) ......", ans: "2.30 / two thirty / half past two" },
          { q: "After the race: use the (18) ...... exit to get to the station.", ans: "north" },
          { q: "After the race: upload your photos to (19) ...... www.", ans: "cheppsat / Cheppsat" }
        ]
      },
      part4: {
        intro: "You will hear an interview with a young writer called Jenny Taylor, who has just had her first novel published.",
        items: [
          { q: "What does Jenny say about school?", opts: ["She read a lot of poems there.","She was proud of what she wrote there.","She admired someone there."], correct: 2 },
          { q: "How did Jenny get the idea for her first novel?", opts: ["talking to friends and family","watching strangers","looking on the internet"], correct: 1 },
          { q: "What's Jenny's novel about?", opts: ["a famous historical event","a long journey","a family's problems"], correct: 2 },
          { q: "How does Jenny feel about her novel?", opts: ["satisfied that it has a good story","pleased that people are buying it","surprised that it was published"], correct: 0 },
          { q: "What does Jenny say about her writing routine?", opts: ["She does her best writing in the morning.","She wears pyjamas when she writes.","She likes to write a similar amount every day."], correct: 1 },
          { q: "What does Jenny usually read for pleasure?", opts: ["funny stories","exciting stories","true stories"], correct: 0 }
        ]
      }
    }
  }
};

</script>
<script>
let currentSkill = 'reading';
let currentTest = 1;
let currentMode = 'practice';
let isAnswerRevealed = false;
let timerInterval = null;

const container = document.getElementById('quiz-container');
const testGroup = document.getElementById('test-group');

function buildTestTabs() {
  testGroup.innerHTML = '';
  for (let t = 1; t <= 4; t++) {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (t === currentTest ? ' active' : '');
    btn.textContent = 'Test ' + t;
    btn.onclick = () => setTest(t);
    testGroup.appendChild(btn);
  }
}

function setSkill(skill) {
  currentSkill = skill;
  document.getElementById('btn-reading').classList.toggle('active', skill === 'reading');
  document.getElementById('btn-listening').classList.toggle('active', skill === 'listening');
  render();
}

function setTest(t) {
  currentTest = t;
  buildTestTabs();
  render();
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-practice').classList.toggle('active', mode === 'practice');
  document.getElementById('btn-test').classList.toggle('active', mode === 'test');
  render();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderMCQ(qid, qText, opts, correctIdx) {
  let html = `<div class="q-card" id="card-${qid}"><div class="q-text">${qText}</div>`;
  const letters = ['A','B','C','D'];
  opts.forEach((opt, idx) => {
    if (currentMode === 'practice') {
      html += `<div class="opt" data-correct-idx="${idx === correctIdx ? '1':'0'}" onclick="checkAns(this,${idx},${correctIdx},'${qid}')">
                 <span class="letter">${letters[idx]}</span><span>${escapeHtml(opt)}</span>
               </div>`;
    } else {
      html += `<label class="opt" onclick="selectRadio(this)">
                 <input type="radio" name="${qid}" value="${idx}" style="display:none">
                 <span class="letter">${letters[idx]}</span><span>${escapeHtml(opt)}</span>
               </label>`;
    }
  });
  html += `</div>`;
  return html;
}

function selectRadio(label) {
  const input = label.querySelector('input');
  input.checked = true;
  const siblings = label.parentElement.querySelectorAll('.opt');
  siblings.forEach(s => s.style.borderColor = 'var(--border)');
  label.style.borderColor = 'var(--primary)';
}

function checkAns(el, idx, correctIdx, qid) {
  if (el.classList.contains('disabled')) return;
  const card = document.getElementById(`card-${qid}`);
  const opts = card.querySelectorAll('.opt');
  opts.forEach(o => o.classList.add('disabled'));
  if (idx === correctIdx) {
    el.classList.add('correct-mark');
  } else {
    el.classList.add('wrong-mark');
    opts[correctIdx].classList.add('correct-mark');
  }
}

function renderGapFill(qid, qNum, opts, correctIdx) {
  return renderMCQ(qid, `Câu ${qNum}.`, opts, correctIdx);
}

function renderTextAnswer(qid, qText, answer) {
  let html = `<div class="q-card" id="card-${qid}"><div class="q-text">${qText}</div>`;
  if (currentMode === 'practice') {
    html += `<button class="btn-mini" onclick="toggleTextAns('ans-${qid}')">Xem đáp án</button>
             <div id="ans-${qid}" class="ans-box ans-reveal">Đáp án: ${escapeHtml(answer)}</div>`;
  } else {
    html += `<input type="text" class="text-input" data-qid="${qid}" placeholder="Nhập câu trả lời...">
             <div class="ans-box" id="ans-${qid}"></div>`;
  }
  html += `</div>`;
  return html;
}

function toggleTextAns(id) {
  document.getElementById(id).classList.toggle('show');
}

function renderMatching(part, prefix) {
  let html = '<div class="match-options-box"><b>Các lựa chọn:</b><br>';
  part.options.forEach(o => {
    html += `<div class="opt-line"><b>${o.key}.</b> ${escapeHtml(o.text)}</div>`;
  });
  html += '</div>';

  part.people.forEach((person, i) => {
    const qid = `${prefix}-m${i}`;
    const correctKey = part.answers[i];
    let optionsHTML = '<option value="">-- Chọn đáp án --</option>';
    part.options.forEach(o => {
      optionsHTML += `<option value="${o.key}">${o.key} - ${escapeHtml(o.text)}</option>`;
    });
    html += `<div class="q-card" id="card-${qid}">
               <div class="q-text"><span class="q-num">${escapeHtml(person.name)}</span> ${escapeHtml(person.desc)}</div>`;
    if (currentMode === 'practice') {
      html += `<select class="dropdown-ans" data-correct="${correctKey}" onchange="checkDropdown(this)">${optionsHTML}</select>
               <div class="ans-box ans-reveal" id="ans-${qid}">Đáp án đúng: ${correctKey} - ${escapeHtml(part.options.find(o=>o.key===correctKey).text)}</div>`;
    } else {
      html += `<select class="dropdown-ans" data-qid="${qid}" data-correct="${correctKey}">${optionsHTML}</select>
               <div class="ans-box" id="ans-${qid}"></div>`;
    }
    html += `</div>`;
  });
  return html;
}

function checkDropdown(sel) {
  const correct = sel.getAttribute('data-correct');
  const val = sel.value;
  if (!val) { sel.style.borderColor = 'var(--border)'; sel.style.background = '#fff'; sel.style.color = 'var(--text)'; return; }
  if (val === correct) {
    sel.style.borderColor = 'var(--ok-border)'; sel.style.background = 'var(--ok-bg)'; sel.style.color = 'var(--ok-text)';
  } else {
    sel.style.borderColor = 'var(--bad-border)'; sel.style.background = 'var(--bad-bg)'; sel.style.color = 'var(--bad-text)';
  }
}

function renderPart4Matching(part, prefix, startNum) {
  let html = `<div class="passage">${part.passage}</div>`;
  html += '<div class="match-options-box"><b>Các lựa chọn:</b><br>';
  part.options.forEach(o => {
    html += `<div class="opt-line"><b>${o.key}.</b> ${escapeHtml(o.text)}</div>`;
  });
  html += '</div>';

  for (let n = startNum; n < startNum + 5; n++) {
    const qid = `${prefix}-g${n}`;
    const correctKey = part.answers[n];
    let optionsHTML = '<option value="">-- Chọn đáp án --</option>';
    part.options.forEach(o => {
      optionsHTML += `<option value="${o.key}">${o.key} - ${escapeHtml(o.text)}</option>`;
    });
    html += `<div class="q-card" id="card-${qid}">
               <div class="q-text">Câu <span class="q-num">${n}</span></div>`;
    if (currentMode === 'practice') {
      html += `<select class="dropdown-ans" data-correct="${correctKey}" onchange="checkDropdown(this)">${optionsHTML}</select>
               <div class="ans-box ans-reveal" id="ans-${qid}">Đáp án đúng: ${correctKey} - ${escapeHtml(part.options.find(o=>o.key===correctKey).text)}</div>`;
    } else {
      html += `<select class="dropdown-ans" data-qid="${qid}" data-correct="${correctKey}">${optionsHTML}</select>
               <div class="ans-box" id="ans-${qid}"></div>`;
    }
    html += `</div>`;
  }
  return html;
}

function render() {
  clearInterval(timerInterval);
  container.innerHTML = '';
  container.classList.remove('revealed-mode');
  isAnswerRevealed = false;
  const toggleBtn = document.getElementById('btn-toggle-answers');
  toggleBtn.classList.remove('active');
  toggleBtn.innerHTML = '👁️ Xem đáp án';

  const submitBtn = document.getElementById('btn-submit');
  const timerEl = document.getElementById('timer');
  const floatingControls = document.getElementById('floating-controls');

  if (currentMode === 'test') {
    submitBtn.style.display = 'block';
    timerEl.style.display = 'inline-block';
    floatingControls.style.display = 'none';
    startTimer(45 * 60);
  } else {
    submitBtn.style.display = 'none';
    timerEl.style.display = 'none';
    floatingControls.style.display = 'flex';
  }

  if (currentSkill === 'reading') renderReading();
  else renderListening();
}

function renderReading() {
  const d = EXAM_DATA.reading[currentTest];
  let html = '';

  html += `<div class="part-title">PART 1 (Câu 1-5)</div>`;
  d.part1.forEach((q, i) => {
    html += renderMCQ(`r${currentTest}-p1-${i}`, `Câu <span class="q-num">${i+1}</span>. ${escapeHtml(q.q)}`, q.opts, q.correct);
  });

  html += `<div class="part-title">PART 2 (Câu 6-10)</div>`;
  html += renderMatching(d.part2, `r${currentTest}-p2`);

  html += `<div class="part-title">PART 3 (Câu 11-15)</div>`;
  d.part3.forEach((q, i) => {
    html += renderMCQ(`r${currentTest}-p3-${i}`, `Câu <span class="q-num">${i+11}</span>. ${escapeHtml(q.q)}`, q.opts, q.correct);
  });

  html += `<div class="part-title">PART 4 (Câu 16-20)</div>`;
  html += renderPart4Matching(d.part4, `r${currentTest}-p4`, 16);

  html += `<div class="part-title">PART 5 (Câu 21-26)</div>`;
  html += `<div class="passage">${d.part5.passage}</div>`;
  d.part5.questions.forEach((q, i) => {
    html += renderGapFill(`r${currentTest}-p5-${i}`, 21 + i, q.opts, q.correct);
  });

  html += `<div class="part-title">PART 6 (Câu 27-32)</div>`;
  html += `<div class="passage">${d.part6.passage}</div>`;
  d.part6.answers.forEach((ans, i) => {
    html += renderTextAnswer(`r${currentTest}-p6-${i}`, `Câu <span class="q-num">${27+i}</span>.`, ans);
  });

  container.innerHTML = html;
}

function renderListening() {
  const d = EXAM_DATA.listening[currentTest];
  let html = '';

  html += `<div class="part-title">PART 1 (Câu 1-7)</div>`;
  d.part1.forEach((q, i) => {
    html += renderMCQ(`l${currentTest}-p1-${i}`, `Câu <span class="q-num">${i+1}</span>. ${escapeHtml(q.q)}`, q.opts, q.correct);
  });

  html += `<div class="part-title">PART 2 (Câu 8-13)</div>`;
  d.part2.forEach((q, i) => {
    html += renderMCQ(`l${currentTest}-p2-${i}`, `Câu <span class="q-num">${i+8}</span>. ${escapeHtml(q.q)}`, q.opts, q.correct);
  });

  html += `<div class="part-title">PART 3 (Câu 14-19)</div>`;
  html += `<div class="p3-intro">${escapeHtml(d.part3.intro)}</div>`;
  d.part3.items.forEach((it, i) => {
    html += renderTextAnswer(`l${currentTest}-p3-${i}`, escapeHtml(it.q).replace(/\((\d+)\)/, '<b>($1)</b>'), it.ans);
  });

  html += `<div class="part-title">PART 4 (Câu 20-25)</div>`;
  html += `<div class="p3-intro">${escapeHtml(d.part4.intro)}</div>`;
  d.part4.items.forEach((q, i) => {
    html += renderMCQ(`l${currentTest}-p4-${i}`, `Câu <span class="q-num">${i+20}</span>. ${escapeHtml(q.q)}`, q.opts, q.correct);
  });

  container.innerHTML = html;
}

function startTimer(duration) {
  let timer = duration;
  const display = document.getElementById('timer');
  timerInterval = setInterval(() => {
    const m = Math.floor(timer / 60), s = timer % 60;
    display.textContent = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
    if (--timer < 0) { clearInterval(timerInterval); submitTest(); }
  }, 1000);
}

function submitTest() {
  clearInterval(timerInterval);
  let score = 0, total = 0;

  // Radio MCQ
  container.querySelectorAll('input[type=radio]').forEach(inp => {
    // handled per group below to avoid double counting
  });

  const radioGroups = {};
  container.querySelectorAll('input[type=radio]').forEach(inp => {
    radioGroups[inp.name] = radioGroups[inp.name] || [];
    radioGroups[inp.name].push(inp);
  });

  Object.keys(radioGroups).forEach(name => {
    total++;
    const inputs = radioGroups[name];
    const card = inputs[0].closest('.q-card');
    const opts = card.querySelectorAll('.opt');
    let correctIdx = -1;
    opts.forEach((o, idx) => {
      // determine correct via stored data on the radio's onchange context is not available;
      // instead re-derive from original data using stored index attr
    });
  });

  // Because correctIndex isn't stored in test mode DOM, recompute by re-reading EXAM_DATA via id pattern
  score = 0; total = 0;
  const skillData = currentSkill === 'reading' ? EXAM_DATA.reading[currentTest] : EXAM_DATA.listening[currentTest];

  function gradeMCQList(list, prefix) {
    list.forEach((q, i) => {
      total++;
      const qid = `${prefix}-${i}`;
      const card = document.getElementById(`card-${qid}`);
      if (!card) return;
      const selected = card.querySelector(`input[name="${qid}"]:checked`);
      const opts = card.querySelectorAll('.opt');
      opts.forEach((opt, idx) => {
        if (idx === q.correct) { opt.style.background = 'var(--ok-bg)'; opt.style.borderColor = 'var(--ok-border)'; }
        else if (selected && parseInt(selected.value) === idx) { opt.style.background = 'var(--bad-bg)'; opt.style.borderColor = 'var(--bad-border)'; }
      });
      if (selected && parseInt(selected.value) === q.correct) score++;
    });
  }

  function gradeTextList(items, prefix, getAns) {
    items.forEach((it, i) => {
      total++;
      const qid = `${prefix}-${i}`;
      const card = document.getElementById(`card-${qid}`);
      if (!card) return;
      const input = card.querySelector(`input[data-qid="${qid}"]`);
      const ansBox = document.getElementById(`ans-${qid}`);
      const correctAns = getAns(it);
      ansBox.textContent = `Đáp án: ${correctAns}`;
      ansBox.classList.add('show');
      if (input) {
        const userVal = input.value.trim().toLowerCase();
        const sysVal = correctAns.toLowerCase();
        input.disabled = true;
        if (userVal && (sysVal.includes(userVal) || userVal.includes(sysVal))) {
          input.style.borderColor = 'var(--ok-border)'; input.style.background = 'var(--ok-bg)';
          score++;
        } else {
          input.style.borderColor = 'var(--bad-border)'; input.style.background = 'var(--bad-bg)';
        }
      }
    });
  }

  function gradeDropdownList(selector, prefix) {
    document.querySelectorAll(`select[data-qid^="${prefix}"]`).forEach(sel => {
      total++;
      const correct = sel.getAttribute('data-correct');
      const ansBox = document.getElementById(`ans-${sel.getAttribute('data-qid')}`);
      sel.disabled = true;
      if (sel.value === correct) {
        sel.style.borderColor = 'var(--ok-border)'; sel.style.background = 'var(--ok-bg)';
        score++;
      } else {
        sel.style.borderColor = 'var(--bad-border)'; sel.style.background = 'var(--bad-bg)';
      }
      if (ansBox) { ansBox.textContent = `Đáp án đúng: ${correct}`; ansBox.classList.add('show'); }
    });
  }

  if (currentSkill === 'reading') {
    const d = skillData;
    gradeMCQList(d.part1, `r${currentTest}-p1`);
    gradeDropdownList(null, `r${currentTest}-p2-m`);
    gradeMCQList(d.part3, `r${currentTest}-p3`);
    gradeDropdownList(null, `r${currentTest}-p4-g`);
    gradeMCQList(d.part5.questions, `r${currentTest}-p5`);
    gradeTextList(d.part6.answers.map(a=>({ans:a})), `r${currentTest}-p6`, it => it.ans);
  } else {
    const d = skillData;
    gradeMCQList(d.part1, `l${currentTest}-p1`);
    gradeMCQList(d.part2, `l${currentTest}-p2`);
    gradeTextList(d.part3.items, `l${currentTest}-p3`, it => it.ans);
    gradeMCQList(d.part4.items, `l${currentTest}-p4`);
  }

  document.getElementById('score-text').textContent = `${score} / ${total}`;
  document.getElementById('score-detail').textContent = score === total ? 'Xuất sắc! 🎉' : (score / total >= 0.7 ? 'Khá tốt, cố gắng thêm!' : 'Cần luyện tập thêm nhé!');
  document.getElementById('overlay').style.display = 'block';
  document.getElementById('modal').style.display = 'block';
  document.getElementById('btn-submit').style.display = 'none';
}

function closeModal() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('modal').style.display = 'none';
}

function toggleAllAnswers() {
  isAnswerRevealed = !isAnswerRevealed;
  const btn = document.getElementById('btn-toggle-answers');
  if (isAnswerRevealed) {
    btn.classList.add('active');
    btn.innerHTML = '🙈 Ẩn đáp án';
    container.classList.add('revealed-mode');
  } else {
    btn.classList.remove('active');
    btn.innerHTML = '👁️ Xem đáp án';
    container.classList.remove('revealed-mode');
  }

  container.querySelectorAll('.opt[data-correct-idx="1"]').forEach(o => {
    o.classList.toggle('revealed', isAnswerRevealed);
  });
  container.querySelectorAll('.ans-reveal').forEach(box => {
    box.classList.toggle('show', isAnswerRevealed);
  });
  container.querySelectorAll('select.dropdown-ans').forEach(sel => {
    if (isAnswerRevealed) {
      sel.value = sel.getAttribute('data-correct');
      checkDropdown(sel);
    } else {
      sel.value = '';
      sel.style.borderColor = 'var(--border)'; sel.style.background = '#fff'; sel.style.color = 'var(--text)';
    }
  });
}

function resetAllAnswers() {
  if (isAnswerRevealed) toggleAllAnswers();
  container.querySelectorAll('.opt').forEach(o => {
    o.classList.remove('correct-mark', 'wrong-mark', 'disabled', 'revealed');
  });
  container.querySelectorAll('select.dropdown-ans').forEach(sel => {
    sel.value = ''; sel.style.borderColor = 'var(--border)'; sel.style.background = '#fff'; sel.style.color = 'var(--text)';
  });
  container.querySelectorAll('.ans-box').forEach(b => b.classList.remove('show'));
}

buildTestTabs();
render();
</script>
